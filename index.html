<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Image Compressor</h1>

    <input type="file" id="imageInput" accept="image/*">

    <input type="number"
           id="targetSize"
           placeholder="Enter target size in KB"
           value="100">

    <button onclick="compressImage()">
        Compress Image
    </button>

    <div class="info">
        <p id="selectedImageSize">Selected Image Size:</p>
        <p id="targetSizeInfo">Target Size:</p>
        <p id="reductionInfo">Need to Reduce:</p>

        <hr>

        <p id="compressedSize"></p>
        <p id="compressionPercent"></p>
    </div>

    <div id="preview"></div>

    <a id="downloadBtn" style="display:none;">
        Download Compressed Image
    </a>

</div>

<script src="script.js"></script>

</body>
</html>
